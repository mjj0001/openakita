name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - pyproject.toml
      - src/**
      - skills/**
      - mcps/**
      - identity/**
      - apps/setup-center/**
      - openakita-plugin-sdk/**
      - .github/workflows/docker-publish.yml
  workflow_dispatch:
    inputs:
      push:
        description: "Push the built image to Docker Hub"
        required: false
        default: true
        type: boolean
      platforms:
        description: "Target platforms"
        required: false
        default: "linux/amd64"
        type: string

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_IMAGE }}
      PLATFORMS: ${{ inputs.platforms || 'linux/amd64' }}
      SHOULD_PUSH: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push == true) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Docker Hub configuration
        if: env.SHOULD_PUSH == 'true'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "${IMAGE_NAME}" || { echo "DOCKERHUB_IMAGE secret is not configured."; exit 1; }
          test -n "${DOCKERHUB_USERNAME}" || { echo "DOCKERHUB_USERNAME secret is not configured."; exit 1; }
          test -n "${DOCKERHUB_TOKEN}" || { echo "DOCKERHUB_TOKEN secret is not configured."; exit 1; }

      - name: Set up QEMU
        if: contains(env.PLATFORMS, 'arm64') || contains(env.PLATFORMS, ',')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        if: env.IMAGE_NAME != ''
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ env.SHOULD_PUSH == 'true' }}
          load: ${{ env.SHOULD_PUSH != 'true' && env.PLATFORMS == 'linux/amd64' }}
          tags: ${{ steps.meta.outputs.tags || 'openakita:ci' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
